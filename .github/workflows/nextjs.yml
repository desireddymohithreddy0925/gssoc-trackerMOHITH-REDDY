# CI: build check only
# Deploy via Vercel — connect repo at https://vercel.com/new
# Vercel handles all Next.js features (API routes, SSR, etc.)

name: Build check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
